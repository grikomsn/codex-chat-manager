name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.14.3
          install-only: true

      - name: Run GoReleaser
        run: |
          repo_dir="/home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}"
          if [ -d "$repo_dir" ]; then
            cd "$repo_dir"
          elif [ -n "${GITHUB_WORKSPACE:-}" ] && [ -d "$GITHUB_WORKSPACE" ]; then
            cd "$GITHUB_WORKSPACE"
          fi
          test -f ./cmd/codex-chat-manager/main.go
          goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
